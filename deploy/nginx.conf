# Nginx site config for the Fillip Skill Academy backend API.
# Deploy to:  /etc/nginx/sites-available/api.fillipskillacademy.com
# Enable with: ln -s /etc/nginx/sites-available/api.fillipskillacademy.com \
#                    /etc/nginx/sites-enabled/
#              nginx -t && systemctl reload nginx
#
# The Node app (PM2) listens on 127.0.0.1:3000 and mounts routes at the ROOT
# (/auth, /courses, /payments, ...). The frontend at fillipskillacademy.com calls
# this host directly at its root (no /api prefix) — see client/src/services/api.js.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.fillipskillacademy.com;

    # Allow Let's Encrypt HTTP-01 challenges to pass through before the cert exists.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.fillipskillacademy.com;

    # TLS — paths created by: certbot --nginx -d api.fillipskillacademy.com
    ssl_certificate     /etc/letsencrypt/live/api.fillipskillacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fillipskillacademy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # File uploads go through multer (avatars, course materials incl. videos), not
    # express.json, so the 100kb JSON cap doesn't apply here — allow large bodies.
    client_max_body_size 200M;

    # The app sets `trust proxy: 1`, so forward the real client IP + scheme for
    # rate limiting and audit logging.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
