# ─────────────────────────────────────────────────────────────────────────────
# aaPanel Nginx config for the FRONTEND  →  fillipskillacademy.com
#
# The React app is a static SPA built with Vite (`npm run build` → client/dist).
# aaPanel serves the files directly; Node is NOT involved for the frontend.
#
# HOW TO USE IN aaPanel:
#   1. Website → Add site → domains: fillipskillacademy.com  www.fillipskillacademy.com
#   2. Set the site's "Run directory" / root to the built assets, e.g.
#         /www/wwwroot/fillipskillacademy.com/dist
#      (Upload the contents of client/dist here — see DEPLOY_AAPANEL.md.)
#   3. Apply SSL: Website → SSL → Let's Encrypt → apply & "Force HTTPS".
#   4. Website → Config File → paste the SPA `location /` block below (replace the
#      default one). Keep aaPanel's listen / ssl / server_name / root lines.
# ─────────────────────────────────────────────────────────────────────────────

# SPA routing: every unknown path must fall back to index.html so React Router
# can handle client-side routes (e.g. /courses/xyz on a hard refresh).
location / {
    try_files $uri $uri/ /index.html;
}

# Hashed build assets (Vite emits content-hashed filenames) are immutable —
# cache them hard. index.html itself must NOT be cached so new deploys show up.
location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|webp|avif|ico|mp4)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
}

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# Let the backend own the canonical sitemap (built from published courses).
# Optional — only if you want fillipskillacademy.com/sitemap.xml to work too.
location = /sitemap.xml {
    proxy_pass https://api.fillipskillacademy.com/sitemap.xml;
    proxy_set_header Host api.fillipskillacademy.com;
}
