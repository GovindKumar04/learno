# ─────────────────────────────────────────────────────────────────────────────
# aaPanel Nginx config for the BACKEND API  →  api.fillipskillacademy.com
#
# HOW TO USE IN aaPanel:
#   1. Website → Add site → domain: api.fillipskillacademy.com
#      (Pick "PHP: pure static" / no PHP; the root dir doesn't matter, Node serves.)
#   2. Apply SSL:  Website → api... → SSL → Let's Encrypt → apply & "Force HTTPS".
#   3. Website → api... → Config File, then REPLACE the `location /` block that
#      aaPanel generated with the `location /` block below.
#      Keep aaPanel's own SSL lines, listen lines, and server_name — only swap
#      the location + the client_max_body_size + add the /health line.
#
# The Node app (PM2, see ecosystem.config.cjs) listens on 127.0.0.1:3000 and
# mounts routes at the ROOT (/auth, /courses, /payments ...). The frontend calls
# this host directly at its root (no /api prefix) — see client/src/services/api.js
# and the client build-time var VITE_API_URL=https://api.fillipskillacademy.com
# ─────────────────────────────────────────────────────────────────────────────

# File uploads go through multer (avatars, course materials incl. videos), not
# express.json, so the 100kb JSON cap doesn't apply — allow large bodies.
client_max_body_size 200M;

# Fast path for aaPanel / uptime monitors.
location = /health {
    proxy_pass http://127.0.0.1:3000/health;
    access_log off;
}

# The app sets `trust proxy: 1`, so forward the real client IP + scheme for
# rate limiting and audit logging.
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 120s;

    # aaPanel adds a default cache/deny block for static assets; the API is
    # dynamic, so make sure nothing here is cached by the proxy layer.
    proxy_cache off;
}
